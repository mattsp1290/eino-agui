name: Parity

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-parity:
    name: Unit parity
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit parity gate
        run: go test ./... -run Parity -count=1
